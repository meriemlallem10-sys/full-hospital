<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - MediCare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/secretary.css">
</head>
<body>
  <div class="app-screen active">
    <header class="hdr">
      <div class="hdr-logo">Medi<span>Care</span></div>
      <div class="hdiv"></div>
      <span class="hbadge">Medical Secretary</span>
      <div class="hsp"></div>
      <div class="hright"><button class="lout" onclick="doLogout()">Logout</button></div>
    </header>

    <nav class="sidebar">
      <div class="ns">Main</div>
      <button class="ni" onclick="location.href='dashboard.html'">Dashboard</button>
      <div class="ns">Patients</div>
      <button class="ni" onclick="location.href='register.html'">Register New Patient</button>
      <button class="ni" onclick="location.href='patients.html'">Patient List</button>
      <div class="ns">Scheduling</div>
      <button class="ni" onclick="location.href='appointments.html'">Schedule Appointments</button>
      <div class="ns">Beds</div>
      <button class="ni" onclick="location.href='rooms.html'">Bed Occupancy</button>
      <div class="ns">Account</div>
      <button class="ni active" onclick="goToNav('s-profile', this)">My Profile</button>
    </nav>

    <main class="main">
      <div class="pg active" id="s-profile">
        <div class="ptitle">My Profile</div>
        <div class="ph">
          <div>
            <div style="font-size:13px;opacity:.8;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:6px;">Medical Secretary</div>
            <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;">Receptionist — Front Desk</div>
          </div>
        </div>
        <div class="pg2">
          <div class="pc">
            <div class="pct">Professional Details</div>
            <div class="prow"><div class="prl">ID</div><div class="prv" id="sec-prof-id">—</div></div>
            <div class="prow"><div class="prl">Role</div><div class="prv">Medical Secretary</div></div>
            <div class="prow"><div class="prl">Username</div><div class="prv" id="sec-prof-user">—</div></div>
            <div class="prow"><div class="prl">Phone</div><div class="prv" id="sec-prof-phone">—</div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/login.js"></script>
  <script>
    if (!restoreSession()) throw new Error('Not authenticated');
    if (curUser.role !== 'secretary') window.location.href = '../index.html';

    // Fill profile info
    document.getElementById('sec-prof-id').textContent = curUser.id;
    document.getElementById('sec-prof-user').textContent = curUser.user;
    document.getElementById('sec-prof-phone').textContent = curUser.phone || '—';


  </script>
</body>
</html>
