<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient List - MediCare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/secretary.css">
</head>
<body>
  <div class="app-screen active">
    <header class="hdr">
      <div class="hdr-logo">Medi<span>Care</span></div>
      <div class="hdiv"></div>
      <span class="hbadge">Medical Secretary</span>
      <div class="hsp"></div>
      <div class="hright"><button class="lout" onclick="doLogout()">Logout</button></div>
    </header>

    <nav class="sidebar">
      <div class="ns">Main</div>
      <button class="ni" onclick="location.href='dashboard.html'">Dashboard</button>
      <div class="ns">Patients</div>
      <button class="ni" onclick="location.href='register.html'">Register New Patient</button>
      <button class="ni active" onclick="goToNav('s-patients', this)">Patient List</button>
      <div class="ns">Scheduling</div>
      <button class="ni" onclick="location.href='appointments.html'">Schedule Appointments</button>
      <div class="ns">Beds</div>
      <button class="ni" onclick="location.href='rooms.html'">Bed Occupancy</button>
      <div class="ns">Account</div>
      <button class="ni" onclick="location.href='profile.html'">My Profile</button>
    </nav>

    <main class="main">
      <div class="pg active" id="s-patients">
        <div class="ptitle">Patient List</div>
        <div class="psub">Search, view and edit patient information.</div>
        <div class="card">
          <div class="sb">
            <div class="sw-srch"><input type="search" id="s-search" placeholder="Search by name or ID…" oninput="renderSecPts()"/></div>
            <button class="btn btn-p" onclick="location.href='register.html'">Register New</button>
          </div>
          <div class="tw">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Full Name</th>
                  <th>Dept</th>
                  <th>Bed</th>
                  <th>Admitted</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="s-ptbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Patient File Modal -->
  <div class="mo" id="sec-file-mo" aria-hidden="true" onclick="closeMoBg(event)">
    <div class="md">
      <div class="mh">
        <div class="mt" id="sec-file-mo-title">Patient File</div>
        <button class="mc" onclick="closeMo('sec-file-mo')">×</button>
      </div>
      <div class="mb" id="sec-file-mo-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/secretary.js"></script>
  <script>
    (async function() {
      if (!restoreSession()) throw new Error('Not authenticated');
      if (curUser.role !== 'secretary') window.location.href = '../index.html';
      try {
        await loadBackendData();
      } catch (err) {
        showToast('Failed to load data from server.', 'err', 8000);
      }
      renderSecPts();
    })();
  </script>
</body>
</html>
