<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - MediCare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="app-screen active">
    <header class="hdr">
      <div class="hdr-logo">Medi<span>Care</span></div>
      <div class="hdiv"></div>
      <span class="hbadge" id="admin-badge">Administrator</span>
      <div class="hsp"></div>
      <div class="hright"><button class="lout" onclick="doLogout()">Logout</button></div>
    </header>

    <nav class="sidebar">
      <div class="ns">Main</div>
      <button class="ni" onclick="goToAdmin('a-stats', this)">Statistics</button>
      <div class="ns">Management</div>
      <button class="ni" onclick="goToAdmin('a-staff', this)">Staff List</button>
      <div class="ns">Account</div>
      <button class="ni active" onclick="goToAdmin('a-profile', this)">My Profile</button>
    </nav>

    <main class="main">
      <div class="pg active" id="a-profile">
        <div class="ptitle">My Profile</div>
        <div class="ph" id="admin-profile-header" style="background:linear-gradient(135deg,#1a2332,#1a5f7a);">
          <div>
            <div style="font-size:13px;opacity:.8;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:6px;">Administrator</div>
            <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;">System Administrator</div>
            <div style="font-size:13px;opacity:.65;">Full system access</div>
          </div>
        </div>
        <div class="pg2">
          <div class="pc" style="background:linear-gradient(135deg,rgba(26,95,122,.08),rgba(26,35,50,.08));border-left:4px solid #1a5f7a;">
            <div class="pct">Professional Details</div>
            <div class="prow"><div class="prl">ID</div><div class="prv" id="admin-prof-id">—</div></div>
            <div class="prow"><div class="prl">Role</div><div class="prv">Administrator</div></div>
            <div class="prow"><div class="prl">Username</div><div class="prv" id="admin-prof-user">—</div></div>
            <div class="prow"><div class="prl">Phone</div><div class="prv" id="admin-prof-phone">—</div></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/admin.js"></script>
  <script>
    if (!restoreSession()) throw new Error('Not authenticated');
    if (curUser.role !== 'admin') window.location.href = '../index.html';

    document.getElementById('admin-badge').textContent = 'Administrator';
    document.getElementById('admin-profile-header').innerHTML = `
      <div>
        <div style="font-size:13px;opacity:.8;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:6px;">Administrator</div>
        <div style="font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:4px;">System Administrator</div>
        <div style="font-size:13px;opacity:.65;">Full system access</div>
      </div>
    `;
    // Fill profile info
    document.getElementById('admin-prof-id').textContent = curUser.id;
    document.getElementById('admin-prof-user').textContent = curUser.user;
    document.getElementById('admin-prof-phone').textContent = curUser.phone || '—';
  </script>
</body>
</html>
