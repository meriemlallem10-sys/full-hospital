<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient List - MediCare</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/nurse.css">
</head>
<body>
  <div class="app-screen active">
    <header class="hdr">
      <div class="hdr-logo">Medi<span>Care</span></div>
      <div class="hdiv"></div>
      <span class="hbadge" id="nur-badge">Nurse</span>
      <div class="hsp"></div>
      <div class="hright"><button class="lout" onclick="doLogout()">Logout</button></div>
    </header>

    <nav class="sidebar">
      <div class="ns">Main</div>
      <button class="ni" onclick="window.location.href='dashboard.html'">Dashboard</button>
      <div class="ns">Patients</div>
      <button class="ni active" onclick="window.location.href='patients.html'">Patient List</button>
      <div class="ns">Account</div>
      <button class="ni" onclick="window.location.href='profile.html'">My Profile</button>
    </nav>

    <main class="main">
      <div class="pg active" id="n-patients">
        <div class="ptitle">Patient List</div>
        <div class="psub">Patients currently under your care.</div>
        <div class="card">
          <div class="sb">
            <div class="sw-srch"><input type="search" placeholder="Search by name or ID…" oninput="renderNursePts(this.value)"/></div>
          </div>
          <div class="tw"><table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Bed</th>
                <th>Admitted</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="n-ptbody"></tbody>
          </table></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Patient File Modal -->
  <div class="mo" id="nur-file-mo" aria-hidden="true" onclick="closeMoBg(event)">
    <div class="md">
      <div class="mh">
        <div class="mt" id="nur-file-mo-title">Patient File</div>
        <button class="mc" onclick="closeMo('nur-file-mo')">×</button>
      </div>
      <div class="mb" id="nur-file-mo-body"></div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/login.js"></script>
  <script src="../assets/js/nurse.js"></script>
  <script>
    (async function() {
      if (!restoreSession()) throw new Error('Not authenticated');
      if (curUser.role !== 'nurse') window.location.href = '../index.html';

      try {
        await loadBackendData();
      } catch (err) {
        showToast('Unable to load data from backend.', 'err');
      }

      document.getElementById('nur-badge').textContent = curUser.name;
      renderNursePts();
    })();
  </script>
</body>
</html>
